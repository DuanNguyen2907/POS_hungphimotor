services:
  postgres:
    image: postgres:16
    container_name: pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: posdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pos_postgres_data:/var/lib/postgresql/data

  keycloak-db:
    image: postgres:16
    container_name: keycloak-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: keycloak
    volumes:
      - keycloak_postgres_data:/var/lib/postgresql/data

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: pos-keycloak
    restart: unless-stopped
    command: ["start-dev"]
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
    ports:
      - "8081:8080"
    depends_on:
      - keycloak-db

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: posdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      Keycloak__Authority: http://keycloak:8080/realms/pos
      Keycloak__Audience: pos-api
      Keycloak__RequireHttpsMetadata: "false"
    depends_on:
      - postgres
      - keycloak
    ports:
      - "5000:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: pos-frontend
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "3000:8080"

volumes:
  pos_postgres_data:
  keycloak_postgres_data:
