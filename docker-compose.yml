services:
  postgres:
    image: postgres:16
    container_name: pos-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: posdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pos_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d posdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pos-api
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
    ports:
      - "5000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: pos-frontend
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - api

volumes:
  pos_postgres_data:
